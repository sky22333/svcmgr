name: 安卓构建发布

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "发布标签"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  release:
    name: Lint、构建并发布
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || 'v1.0.0' }}

    steps:
      - name: 拉取代码
        uses: actions/checkout@v6

      - name: 配置 JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: 配置 Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.4.1"
          cache-provider: basic

      - name: 执行内核下载脚本
        run: |
          chmod +x add.sh
          ./add.sh

      - name: 写入签名证书
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/signing"
          echo "$SIGNING_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/signing/release.p12"

      - name: Lint 检测
        env:
          RELEASE_STORE_FILE: ${{ runner.temp }}/signing/release.p12
          RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          RELEASE_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set +e
          gradle lintRelease \
            -PRELEASE_STORE_FILE="$RELEASE_STORE_FILE" \
            -PRELEASE_KEY_ALIAS="$RELEASE_KEY_ALIAS" \
            -PRELEASE_STORE_PASSWORD="$RELEASE_STORE_PASSWORD" \
            -PRELEASE_KEY_PASSWORD="$RELEASE_KEY_PASSWORD"
          status=$?
          report="app/build/intermediates/lint_intermediate_text_report/release/lintReportRelease/lint-results-release.txt"
          if [ -f "$report" ]; then
            echo "----- Lint 结果 -----"
            cat "$report"
            echo "---------------------"
          fi
          exit $status

      - name: 构建正式版本
        env:
          RELEASE_STORE_FILE: ${{ runner.temp }}/signing/release.p12
          RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          RELEASE_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          gradle assembleRelease \
            -PRELEASE_STORE_FILE="$RELEASE_STORE_FILE" \
            -PRELEASE_KEY_ALIAS="$RELEASE_KEY_ALIAS" \
            -PRELEASE_STORE_PASSWORD="$RELEASE_STORE_PASSWORD" \
            -PRELEASE_KEY_PASSWORD="$RELEASE_KEY_PASSWORD"
          cp app/build/outputs/apk/release/app-release.apk svcmgr.apk

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          files: svcmgr.apk
          fail_on_unmatched_files: true